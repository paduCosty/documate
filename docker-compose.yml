# ─────────────────────────────────────────────────────────────────────────────
# LOCAL DEVELOPMENT
# Pornire: docker-compose up
# Vite HMR rulează pe HOST: npm run dev (din /documate)
# Backend:  http://documate.test  (via Traefik global pe reteaua "shared")
# ─────────────────────────────────────────────────────────────────────────────

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: dev
    container_name: documate_app
    restart: unless-stopped
    env_file: .env
    environment:
      APP_ENV: local
      APP_DEBUG: "true"
      DB_HOST: db
      DB_PORT: 3306
    volumes:
      - .:/var/www/html
      - /var/www/html/vendor
      - documate_storage:/var/www/html/storage
      - documate_bootstrap:/var/www/html/bootstrap/cache
    ports:
      - "5174:5173"    # Vite HMR
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.documate.rule=Host(`documate.test`)"
      - "traefik.http.routers.documate.entrypoints=http"
      - "traefik.http.services.documate.loadbalancer.server.port=80"
    depends_on:
      db:
        condition: service_healthy
    networks:
      - documate_net
      - shared

  db:
    image: mysql:8.0
    container_name: documate_db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${DB_DATABASE:-documate}
      MYSQL_USER: ${DB_USERNAME:-documate}
      MYSQL_PASSWORD: ${DB_PASSWORD:-secret}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-rootsecret}
    volumes:
      - documate_db:/var/lib/mysql
    ports:
      - "3310:3306"
    networks:
      - documate_net
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  documate_storage:
  documate_bootstrap:
  documate_db:

networks:
  documate_net:
    driver: bridge
  shared:
    external: true
